<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Hocoslamfy</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0d1117;
        color: #c9d1d9;
        font-family: monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        gap: 10px;
        padding: 10px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
      }

      a {
        color: #c9d1d9;
      }

      #canvas {
        display: block;
        border: 2px solid #30363d;
        width: min(640px, 100%);
        aspect-ratio: 4 / 3;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        cursor: pointer;
      }

      #controls {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        width: 640px;
        max-width: 100%;
      }

      #boost-btn {
        padding: 22px;
        font-size: 1.1rem;
        font-family: monospace;
        font-weight: bold;
        letter-spacing: 3px;
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      #boost-btn:active,
      #boost-btn.pressed {
        background: #2ea043;
        transform: translateY(1px);
      }

      #meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn-group {
        display: flex;
        border: 1px solid #30363d;
        border-radius: 6px;
        overflow: hidden;
      }

      .btn-group button {
        padding: 6px 12px;
        font-family: monospace;
        font-size: 0.82rem;
        background: #21262d;
        color: #8b949e;
        border: none;
        border-right: 1px solid #30363d;
        cursor: pointer;
        white-space: nowrap;
      }

      .btn-group button:last-child {
        border-right: none;
      }

      .btn-group button:hover {
        background: #30363d;
      }

      .btn-group button.active {
        background: #1f6feb;
        color: #fff;
      }

      #keyboard-hint {
        font-size: 0.73rem;
        color: #6e7681;
        text-align: right;
        flex: 1;
      }

      #status {
        font-size: 0.8rem;
        color: #8b949e;
        min-height: 1.2em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="controls">
      <button id="boost-btn">TAP TO FLY</button>
      <div id="meta">
        <div class="btn-group" id="music-group">
          <button data-val="0" class="active">Music: OFF</button>
          <button data-val="1">Music: ON</button>
        </div>
        <div class="btn-group" id="sfx-group">
          <button data-val="0">SFX: OFF</button>
          <button data-val="1" class="active">SFX: ON</button>
        </div>
        <div class="btn-group" id="speed-group">
          <button data-val="1" class="active">1x</button>
          <button data-val="1.25">turbo</button>
        </div>
        <span id="keyboard-hint"
          >Space/Enter = fly &bull; P = pause &bull;
          <a href="https://github.com/forresto/hocoslamfy">src</a></span
        >
      </div>
    </div>

    <div id="status">Loading...</div>

    <script>
      var Module = {
        canvas: document.getElementById("canvas"),
        print: function (text) {
          console.log(text);
        },
        printErr: function (text) {
          console.error(text);
        },

        onRuntimeInitialized: function () {
          document.getElementById("status").textContent = "";

          var boostDown = Module.cwrap("TriggerBoostDown", null, []);
          var boostUp = Module.cwrap("TriggerBoostUp", null, []);
          var setMusic = Module.cwrap("SetMusicMuted", null, ["number"]);
          var setSFX = Module.cwrap("SetSFXMuted", null, ["number"]);
          var setScrollSpeed = Module.cwrap("SetFieldScrollMultiplier", null, ["number"]);

          // boost button
          var btn = document.getElementById("boost-btn");
          function down(e) {
            e.preventDefault();
            btn.classList.add("pressed");
            boostDown();
          }
          function up(e) {
            e.preventDefault();
            btn.classList.remove("pressed");
            boostUp();
          }
          btn.addEventListener("mousedown", down);
          btn.addEventListener("mouseup", up);
          btn.addEventListener("mouseleave", up);
          btn.addEventListener("touchstart", down, { passive: false });
          btn.addEventListener("touchend", up, { passive: false });
          btn.addEventListener("touchcancel", up);

          // canvas taps
          var canvas = document.getElementById("canvas");
          canvas.addEventListener("mousedown", function () {
            boostDown();
          });
          canvas.addEventListener("mouseup", function () {
            boostUp();
          });
          canvas.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              boostDown();
            },
            { passive: false },
          );
          canvas.addEventListener(
            "touchend",
            function (e) {
              e.preventDefault();
              boostUp();
            },
            { passive: false },
          );
          canvas.addEventListener("touchcancel", function () {
            boostUp();
          });

          // generic segmented control handler
          function makeGroup(id, onChange) {
            var group = document.getElementById(id);
            group.addEventListener("click", function (e) {
              var target = e.target.closest("button");
              if (!target) return;
              group.querySelectorAll("button").forEach(function (b) {
                b.classList.remove("active");
              });
              target.classList.add("active");
              onChange(target.dataset.val);
            });
          }

          makeGroup("music-group", function (val) {
            setMusic(parseInt(val, 10) === 0 ? 1 : 0);
          });
          makeGroup("sfx-group", function (val) {
            setSFX(parseInt(val, 10) === 0 ? 1 : 0);
          });
          makeGroup("speed-group", function (val) {
            setScrollSpeed(parseFloat(val));
          });
        },

        setStatus: function (text) {
          if (text) document.getElementById("status").textContent = text;
        },
      };
    </script>
    <script>
      window.addEventListener(
        "keydown",
        function (e) {
          if (e.key === "Escape") {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true,
      );
    </script>
    <script src="hocoslamfy.js"></script>
  </body>
</html>
